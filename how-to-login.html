                <li>ابحث عن <span class="pill">مجلد الرسائل الجانبية (سبام)</span> وانقر عليه — حدّثه إذا لزم الأمر</li>
                <li>ستجد بريدًا إلكترونيًا من <strong>"noreply"</strong> — افتحه وانقر على الرابط داخله (هذا الرابط <strong>آمن تمامًا</strong>)</li>
              </ul>`
          },
          {
            icon: '↩️',
            text: `ارجع إلى الموقع وانقر على زر <span class="pill">"إلى تسجيل الدخول"</span>.`
          },
          {
            icon: '🔐',
            text: `أدخل <strong>عنوان بريدك الإلكتروني</strong> و<strong>كلمة المرور</strong> التي أنشأتها.`
          }
        ],
        congrats: '🏺 تهانينا! يمكنك الآن الدخول إلى مغامرة تاريخ مصر.',
        videoLabel: '🎬 فيديو الشرح'
      }
    };

    let currentLang = 'de';

    function setLang(lang) {
      currentLang = lang;
      // Update active btn
      ['de','en','ar'].forEach(l => {
        const btn = document.getElementById('btn' + l.charAt(0).toUpperCase() + l.slice(1));
        btn.classList.toggle('active', l === lang);
        btn.setAttribute('aria-pressed', l === lang ? 'true' : 'false');
      });
      renderSteps(lang);
    }

    function renderSteps(lang) {
      const data = STEPS[lang];
      const wrap = document.getElementById('stepsWrap');
      const dir = data.dir;

      // Update page title
      document.getElementById('pageTitle').textContent = data.pageTitle;
      document.getElementById('pageTitleSub').textContent = data.pageTitleSub;
      document.getElementById('videoLabel').textContent = data.videoLabel;
      document.documentElement.dir = dir;

      // Build steps HTML
      let html = '';
      data.steps.forEach((s, i) => {
        html += `
          <div class="step-card" dir="${dir}">
            <div class="step-number">${i + 1}</div>
            <div class="step-body">
              <span class="step-icon">${s.icon}</span>
              <div class="step-text">${s.text}</div>
            </div>
          </div>`;
      });

      // Congrats
      html += `
        <div class="congrats-card" dir="${dir}">
          <span class="congrats-glyph">🎊</span>
          <div class="congrats-text">${data.congrats}</div>
        </div>`;

      wrap.innerHTML = html;

      // Animate in
      wrap.style.opacity = '0';
      wrap.style.transform = 'translateY(16px)';
      requestAnimationFrame(() => {
        wrap.style.transition = 'opacity .5s ease, transform .5s ease';
        wrap.style.opacity = '1';
        wrap.style.transform = 'none';
      });
    }

    function goBack() {
      const page = document.getElementById('mainPage');
      page.style.transition = 'opacity .5s';
      page.style.opacity = '0';
      setTimeout(() => { window.location.href = 'index.html'; }, 520);
    }

    function goLogin() {
      const page = document.getElementById('mainPage');
      page.style.transition = 'opacity .5s';
      page.style.opacity = '0';
      setTimeout(() => { window.location.href = 'index.html'; }, 520);
    }

    // Init
    renderSteps('de');
  </script>

</body>
</html>
